---
- name: Run nslookup on servers and show results
  hosts: target_group
  become: true
  gather_facts: false
  become_user: root
  become_method: su
  become_exe: sudo su -
  tasks:
    - name: Get server hostname
      ansible.builtin.command: hostname
      register: hostname_output
      changed_when: false

    - name: Run nslookup for internal-host-01.example.local
      ansible.builtin.command: nslookup internal-host-01.example.local
      register: nslookup1
      changed_when: false

    - name: Run nslookup for internal-host-02.example.local
      ansible.builtin.command: nslookup internal-host-02.example.local
      register: nslookup2
      changed_when: false

    - name: Run nslookup for internal-host-03.example.local
      ansible.builtin.command: nslookup internal-host-03.example.local
      register: nslookup3
      changed_when: false

    - name: Show results
      ansible.builtin.debug:
        msg: |
          Server: {{ hostname_output.stdout }}
          Result nslookup internal-host-01.example.local:
          {{ nslookup1.stdout }}
