---
- hosts: target_group
  become: true
  gather_facts: false
  become_user: root
  become_method: su
  become_exe: sudo su -
  tasks:
    - name: Remove old SUSE registration data (generic example)
      ansible.builtin.shell: >-
        cp /etc/SUSEConnect /root/SUSEConnect_backup;
        SUSEConnect --de-register;
        SUSEConnect --cleanup;
        rm -f /etc/SUSEConnect;
        rm -rf /etc/zypp/credentials.d/*;
        rm -rf /etc/zypp/repos.d/*;
        rm -f /etc/zypp/services.d/*
      register: command_output
      ignore_errors: true
      changed_when: true

    - name: Show cleanup output
      ansible.builtin.debug:
        var: command_output.stdout_lines

    - name: Register SUSE using a generic helper script
      ansible.builtin.shell: >-
        REGISTER=$(grep url /root/SUSEConnect_backup | awk '{print $2}');
        echo $'y\ny\n' | /root/client_setup_smt.sh "$REGISTER" 2>&1
      register: register_output
      changed_when: true

    - name: Show registration output
      ansible.builtin.debug:
        var: register_output.stdout_lines
